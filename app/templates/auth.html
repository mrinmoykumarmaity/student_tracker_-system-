<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Study Tracker</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f7fa; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .auth-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); padding: 48px 40px; width: 100%; max-width: 420px; }
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
        .logo i { font-size: 2rem; color: #4361ee; }
        .logo span { font-size: 1.3rem; font-weight: 700; color: #1a1a2e; }
        h1 { font-size: 1.7rem; margin: 0 0 8px; color: #1a1a2e; }
        p.subtitle { color: #666; margin: 0 0 32px; font-size: 0.95rem; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; transition: border 0.2s; }
        .form-group input:focus { outline: none; border-color: #4361ee; box-shadow: 0 0 0 3px rgba(67,97,238,0.1); }
        .btn-go { width: 100%; padding: 13px; background: #4361ee; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-go:hover { background: #3451d1; }
        .error-msg { background: #fff0f0; color: #c0392b; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.9rem; display: none; }
        .note { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #999; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>Study Tracker</span>
        </div>
        <h1>What's your name?</h1>
        <p class="subtitle">Enter your name to start tracking your study sessions. No account needed.</p>

        <div class="error-msg" id="errorMsg"></div>

        <form id="nameForm">
            <div class="form-group">
                <label for="nameInput">Your Name</label>
                <input type="text" id="nameInput" name="name" placeholder="e.g. Mrinmoy" required autocomplete="name" autofocus minlength="2" maxlength="50">
            </div>
            <button type="submit" class="btn-go" id="submitBtn">
                <i class="fas fa-arrow-right"></i> Go to Dashboard
            </button>
        </form>

        <p class="note">Your data is saved and linked to your name.</p>
    </div>

    <script>
        const form = document.getElementById('nameForm');
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';

            const name = document.getElementById('nameInput').value.trim();

            try {
                const res = await fetch('/enter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const result = await res.json();

                if (result.success) {
                    window.location.href = result.redirect || '/dashboard';
                } else {
                    errorMsg.textContent = result.message;
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Go to Dashboard';
                }
            } catch (err) {
                errorMsg.textContent = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Go to Dashboard';
            }
        });
    </script>
</body>
</html>
