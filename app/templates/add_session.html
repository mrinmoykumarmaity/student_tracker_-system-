{% extends "base.html" %}

{% block title %}Add Session - Study Tracker{% endblock %}

{% block content %}
<div class="add-session-page">
    <h1 class="page-title">Add Study Session</h1>
    
    <div class="form-container">
        <form id="addSessionForm" class="study-form">
            <div class="form-group">
                <label for="subject">
                    <i class="fas fa-book"></i> Subject
                </label>
                <input type="text" id="subject" name="subject" placeholder="e.g., Mathematics, Physics" required>
            </div>
            
            <div class="form-group">
                <label for="duration">
                    <i class="fas fa-clock"></i> Duration (hours)
                </label>
                <input type="number" id="duration" name="duration" step="0.5" min="0.5" placeholder="e.g., 2.5" required>
            </div>
            
            <div class="form-group">
                <label for="topic">
                    <i class="fas fa-lightbulb"></i> Topic Covered
                </label>
                <input type="text" id="topic" name="topic" placeholder="e.g., Calculus - Integration" required>
            </div>
            
            <div class="form-group">
                <label for="study_date">
                    <i class="fas fa-calendar"></i> Study Date
                </label>
                <input type="date" id="study_date" name="study_date" required>
            </div>
            
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="resetForm()">
                    <i class="fas fa-redo"></i> Reset
                </button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Session
                </button>
            </div>
        </form>
    </div>
    
    <!-- Recent Sessions -->
    <div class="recent-sessions-section">
        <h2>Recent Sessions</h2>
        <div id="sessionsList" class="sessions-list"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Set today's date as default
    document.getElementById('study_date').valueAsDate = new Date();
    
    // Handle form submission
    document.getElementById('addSessionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData);
        
        try {
            const response = await fetch('/sessions/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (result.success) {
                showToast('Study session added successfully!');
                e.target.reset();
                document.getElementById('study_date').valueAsDate = new Date();
                loadRecentSessions();
            } else {
                showToast(result.message, 'error');
            }
        } catch (error) {
            showToast('Error adding session. Please try again.', 'error');
            console.error('Error:', error);
        }
    });
    
    // Load recent sessions
    async function loadRecentSessions() {
        try {
            const response = await fetch('/sessions/list');
            const data = await response.json();
            
            const container = document.getElementById('sessionsList');
            
            if (data.sessions.length === 0) {
                container.innerHTML = '<p class="empty-state">No sessions yet. Add your first one above!</p>';
                return;
            }
            
            container.innerHTML = data.sessions.slice(0, 10).map(session => `
                <div class="session-item">
                    <div class="session-info">
                        <h4>${session.subject}</h4>
                        <p>${session.topic}</p>
                        <div class="session-meta">
                            <span><i class="fas fa-calendar"></i> ${session.study_date}</span>
                            <span><i class="fas fa-clock"></i> ${session.duration} hrs</span>
                        </div>
                    </div>
                    <button class="btn-icon delete-btn" onclick="deleteSession(${session.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading sessions:', error);
        }
    }
    
    // Delete session
    async function deleteSession(sessionId) {
        if (!confirm('Are you sure you want to delete this session?')) return;
        
        try {
            const response = await fetch(`/sessions/delete/${sessionId}`, {
                method: 'DELETE'
            });
            
            const result = await response.json();
            
            if (result.success) {
                showToast('Session deleted successfully!');
                loadRecentSessions();
            } else {
                showToast(result.message, 'error');
            }
        } catch (error) {
            showToast('Error deleting session', 'error');
        }
    }
    
    // Reset form
    function resetForm() {
        document.getElementById('addSessionForm').reset();
        document.getElementById('study_date').valueAsDate = new Date();
    }
    
    // Load sessions on page load
    loadRecentSessions();
</script>
{% endblock %}
