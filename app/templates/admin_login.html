<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Study Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0f0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 380px; }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
        .logo i { font-size: 1.6rem; color: #7c3aed; }
        .logo span { font-size: 1rem; font-weight: 700; color: #e2e8f0; letter-spacing: 0.5px; }
        .badge { background: #7c3aed22; color: #a78bfa; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; border: 1px solid #7c3aed44; margin-left: 6px; letter-spacing: 1px; }
        h1 { font-size: 1.5rem; color: #f1f5f9; margin-bottom: 6px; }
        p.sub { color: #64748b; font-size: 0.9rem; margin-bottom: 28px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
        input[type=password] { width: 100%; padding: 12px 16px; background: #0f0f1a; border: 1.5px solid #2a2a4a; border-radius: 10px; color: #f1f5f9; font-size: 1rem; transition: border 0.2s; }
        input[type=password]:focus { outline: none; border-color: #7c3aed; }
        .btn { width: 100%; padding: 13px; background: #7c3aed; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
        .btn:hover { background: #6d28d9; }
        .error { background: #3f0f0f; color: #f87171; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.88rem; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
            <span>Study Tracker <span class="badge">ADMIN</span></span>
        </div>
        <h1>Admin Access</h1>
        <p class="sub">Enter your admin password to continue.</p>

        <div class="error" id="errorMsg"></div>

        <form id="loginForm">
            <label for="pwd">Password</label>
            <input type="password" id="pwd" placeholder="••••••••••••" autofocus required>
            <button type="submit" class="btn" id="submitBtn">
                <i class="fas fa-lock-open"></i> Enter Admin Panel
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('errorMsg');
            err.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            const res = await fetch('/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: document.getElementById('pwd').value })
            });
            const data = await res.json();

            if (data.success) {
                window.location.href = data.redirect;
            } else {
                err.textContent = data.message || 'Wrong password';
                err.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock-open"></i> Enter Admin Panel';
            }
        });
    </script>
</body>
</html>
